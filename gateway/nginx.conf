server {
    listen 8080;
    server_name metrics.tjw.dev;

    # Trust cloudflared and use Cloudflare's real IP header
    set_real_ip_from 127.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    real_ip_header CF-Connecting-IP;

    # Tracking script
    location = /metrics.js {
        proxy_pass http://umami:30060;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    # Pageview collection endpoint (COLLECT_API_ENDPOINT=ack maps to /api/ack)
    location = /api/ack {
        proxy_pass http://umami:30060;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    location / {
        return 404;
    }
}

# Catch-all: reject unknown hostnames
server {
    listen 8080 default_server;
    server_name _;
    return 444;
}
